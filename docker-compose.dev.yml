version: '3.9'

# Local Postgres for development only.
# Run `docker compose -f docker-compose.dev.yml up -d`, then:
#   cd backend && pip install -r requirements.txt && fastapi dev app/main.py
#   cd frontend && npm install && npm run dev
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: brandedstore
      POSTGRES_PASSWORD: brandedstore
      POSTGRES_DB: brandedstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
