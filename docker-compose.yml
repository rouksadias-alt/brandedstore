services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
        - NEXT_PUBLIC_WHATSAPP_NUMBER=${NEXT_PUBLIC_WHATSAPP_NUMBER:-}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - NEXT_PUBLIC_WHATSAPP_NUMBER=${NEXT_PUBLIC_WHATSAPP_NUMBER:-}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:brandedstore@brandedstore_databasebranded:5432/brandedstore?sslmode=disable}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-https://tudominio.com}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER:-50760000000}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-dev-insecure-change-this-secret}
      - ADMIN_SESSION_HOURS=${ADMIN_SESSION_HOURS:-12}
    restart: unless-stopped
