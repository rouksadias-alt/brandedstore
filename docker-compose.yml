services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Same Easypanel substitution issue as the backend below — these
        # defaults are what's ACTUALLY baked into the compiled frontend.
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.soyleger.store}
        - NEXT_PUBLIC_WHATSAPP_NUMBER=${NEXT_PUBLIC_WHATSAPP_NUMBER:-34694210495}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.soyleger.store}
      - NEXT_PUBLIC_WHATSAPP_NUMBER=${NEXT_PUBLIC_WHATSAPP_NUMBER:-34694210495}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # NOTE: Easypanel's "Variables d'environnement" panel for this compose
      # project does NOT get substituted into these ${VAR:-default} slots
      # (confirmed by `echo $DATABASE_URL` inside the running backend
      # container returning the *default* value, not the one shown in the
      # UI). Until that's sorted out on the Easypanel side, the values after
      # the `:-` are what's ACTUALLY used in production — keep them in sync
      # with the real credentials (Postgres password, admin password, real
      # domains) instead of relying on the Easypanel panel.
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:7Otlcjn37i2kczza34rm@brandedstore_databasebranded:5432/brandedstore?sslmode=disable}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-https://soyleger.store}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER:-34694210495}
      - GOOGLE_SHEETS_WEBHOOK_URL=${GOOGLE_SHEETS_WEBHOOK_URL:-https://script.google.com/macros/s/AKfycbwdEw8_v2lZ5U66Nr5LRh4mYmdqNOfirI3xNiddUuHmiUjyPZhs_DveMzAOD4XRQvtV/exec}
      - CALLMEBOT_API_KEY=${CALLMEBOT_API_KEY:-4926995}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-00198600}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-qZhmaOlgACQ0ovBFdzHStcYRfkjpe3JTGxX8VUwu}
      - ADMIN_SESSION_HOURS=${ADMIN_SESSION_HOURS:-12}
    restart: unless-stopped
